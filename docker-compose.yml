version: '3.8'

services:
  webui:
    build: .
    ports:
      - "1455:1455"
    environment:
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=1455
      - DEBUG=0
      - LOG_LEVEL=info
      - HTTP_PROXY=http://host.docker.internal:7890
      - HTTPS_PROXY=http://host.docker.internal:7890
      - ALL_PROXY=http://host.docker.internal:7890
      - NO_PROXY=localhost,127.0.0.1
      - http_proxy=http://host.docker.internal:7890
      - https_proxy=http://host.docker.internal:7890
      - all_proxy=http://host.docker.internal:7890
      - no_proxy=localhost,127.0.0.1
      # 如果需要访问密码，可以在这里取消注释并设置
      # - WEBUI_ACCESS_PASSWORD=your_secure_password
    volumes:
      # 挂载数据目录以持久化数据库和日志
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
